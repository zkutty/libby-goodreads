name: Libby Watchdog

on:
  schedule:
    # 9am Eastern time — 1pm UTC (EDT, UTC-4, Mar–Nov) / shifts to 10am ET in winter (EST, UTC-5)
    - cron: "0 13 * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run watchdog
        env:
          GOODREADS_RSS: ${{ secrets.GOODREADS_RSS }}
          LIBRARY_KEYS: ${{ secrets.LIBRARY_KEYS }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Commit updated state.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "chore: update state.json [skip ci]"
          git push
